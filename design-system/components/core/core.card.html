<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--xu-bg); font-family: var(--font-body); }
  .wrap { padding: 20px 22px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font: 600 10px var(--font-body); color: var(--xu-caption); text-transform: uppercase; letter-spacing: .5px; width: 100%; margin-bottom: -4px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Chip, ProgressBar, StatPill, IconTile } = window.XuXuDesignSystem_72e90e;
    function Card() {
      return (
        <div className="wrap">
          <div className="row">
            <span className="lbl">Button variants</span>
            <Button variant="primary">HỌC TIẾP</Button>
            <Button variant="streak">GIỮ STREAK</Button>
            <Button variant="gold">DÙNG THỬ</Button>
            <Button variant="secondary">120 xu</Button>
            <Button variant="ghost">Bỏ qua</Button>
            <Button disabled>KIỂM TRA</Button>
          </div>
          <div className="row">
            <span className="lbl">Sizes</span>
            <Button size="sm">Nhỏ</Button>
            <Button size="md">Vừa</Button>
            <Button size="lg">Lớn</Button>
          </div>
          <div className="row">
            <span className="lbl">Stat pills · chips · tiles</span>
            <StatPill kind="streak" value={7} />
            <StatPill kind="xu" value={1250} />
            <StatPill kind="xp" value={3200} />
            <Chip tone="green">6-8 tuổi</Chip>
            <Chip tone="indigo">9-12 tuổi</Chip>
            <Chip tone="violet">13-16 tuổi</Chip>
            <IconTile bg="#FFF9E6" fontSize={22}>💰</IconTile>
            <IconTile bg="var(--xu-gems-50)" color="var(--xu-gems)">◆</IconTile>
          </div>
          <div className="row" style={{ flexDirection: "column", alignItems: "stretch", gap: 8, maxWidth: 320 }}>
            <span className="lbl">Progress bars</span>
            <ProgressBar value={64} />
            <ProgressBar value={40} tone="streak" />
            <ProgressBar value={80} tone="gems" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
  </script>
</body>
</html>
