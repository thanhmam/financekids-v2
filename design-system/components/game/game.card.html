<!-- @dsCard group="Components" viewport="700x340" name="Game — Lessons & Quiz" subtitle="LessonCard states and QuizOption reveal styling" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--xu-bg); font-family: var(--font-body); }
  .wrap { padding: 18px 22px; display: flex; gap: 22px; align-items: flex-start; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 320px; }
  .quiz { flex: 1; display: flex; flex-direction: column; gap: 10px; max-width: 320px; }
  .lbl { font: 600 10px var(--font-body); color: var(--xu-caption); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { LessonCard, QuizOption } = window.XuXuDesignSystem_72e90e;
    function Card() {
      return (
        <div className="wrap">
          <div>
            <div className="lbl">LessonCard</div>
            <div className="cards">
              <LessonCard lesson={{ title: "Tiền là gì?", subtitle: "Hiểu về tiền và công dụng", ageGroup: "6-8", icon: "💰", bgColor: "#FFF9E6", xp: 100 }} />
              <LessonCard completed lesson={{ title: "Cần và Muốn", subtitle: "Phân biệt cần & muốn", ageGroup: "6-8", icon: "⚖️", bgColor: "#E8F5E9", xp: 120 }} />
            </div>
          </div>
          <div className="quiz">
            <div className="lbl">QuizOption · reveal states</div>
            <QuizOption index={0} state="correct">Mua đồ ăn, quần áo và đồ chơi</QuizOption>
            <QuizOption index={1} state="wrong">Dùng để vẽ tranh</QuizOption>
            <QuizOption index={2} state="dimmed">Dùng để uống</QuizOption>
            <QuizOption index={3} state="idle">Dùng để gối đầu ngủ</QuizOption>
            <QuizOption index={4} state="selected">Để dành vào heo đất</QuizOption>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
  </script>
</body>
</html>
