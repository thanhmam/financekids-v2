<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { display: flex; gap: 40px; padding: 24px 30px; align-items: center; }
  .grp { display: flex; gap: 22px; align-items: flex-end; }
  .coins { display: flex; gap: 14px; align-items: center; }
  .lbl { font: 600 10px var(--font-body); color: var(--xu-caption); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
  .divider { width: 1px; align-self: stretch; background: var(--xu-line); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { XuXuMascot, XuCoin } = window.XuXuDesignSystem_72e90e;
    function Card() {
      return (
        <div className="wrap">
          <div>
            <div className="lbl">XuXuMascot · moods</div>
            <div className="grp">
              <XuXuMascot size={80} mood="happy" />
              <XuXuMascot size={80} mood="excited" />

              <span style={{ font: "800 15px 'Baloo 2'", color: "var(--xu-ink)" }}>+50</span>

    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);

</html>
