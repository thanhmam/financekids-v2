<!-- @dsCard group="Components" viewport="700x170" name="Navigation — Bottom Tabs" subtitle="Mobile 5-tab bar, one frame per active tab" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--xu-bg); font-family: var(--font-body); }
  .wrap { padding: 20px 24px; display: flex; gap: 22px; flex-wrap: wrap; }
  .phone { width: 200px; height: 64px; position: relative; background: var(--xu-bg); border: 2px solid var(--xu-line); border-radius: 16px; overflow: hidden; }
  .lbl { font: 600 10px var(--font-body); color: var(--xu-caption); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { BottomNav } = window.XuXuDesignSystem_72e90e;
    function Frame({ active, label }) {
      return (
        <div>
          <div className="lbl">{label}</div>
          <div className="phone"><BottomNav active={active} /></div>
        </div>
      );
    }
    function Card() {
      return (
        <div className="wrap">
          <Frame active="home" label="Học" />
          <Frame active="tasks" label="Nhiệm vụ" />
          <Frame active="leaderboard" label="Xếp hạng" />
          <Frame active="profile" label="Hồ sơ" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
  </script>
</body>
</html>
