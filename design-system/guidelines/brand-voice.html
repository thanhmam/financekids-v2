<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { padding: 24px 30px; display: flex; gap: 40px; align-items: center; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .coin { width: 48px; height: 48px; border-radius: 50%; background: radial-gradient(circle at 38% 30%,#FFE594,#FFC93C 58%,#F2B01E); border: 3px solid var(--xu-gold-dark); box-shadow: 0 5px 0 var(--xu-gold-shadow); }
  .word { font: var(--fw-display) 34px var(--font-display); color: var(--xu-green); letter-spacing: -.5px; }
  .divider { width: 1px; height: 70px; background: var(--xu-line); }
  .voice { max-width: 280px; }
  .vh { font: var(--fw-display) 13px var(--font-display); color: var(--xu-ink); margin-bottom: 6px; }
  .vt { font: 600 12px var(--font-body); color: var(--xu-muted); line-height: 1.5; }
  .pill { display:inline-block; background: var(--xu-green-100); color: var(--xu-green-dark); font: 700 11px var(--font-body); border-radius: 999px; padding: 4px 11px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <div class="coin"></div>
      <div class="word">XuXu</div>
    </div>
    <div class="divider"></div>
    <div class="voice">
      <div class="vh">Giọng điệu — warm, encouraging, second-person</div>
      <div class="vt">“Học tài chính mỗi ngày 5 phút, để bạn không bao giờ <b>0 xu</b>.”</div>
      <span class="pill">Miễn phí · Không quảng cáo · Tiếng Việt</span>
    </div>
  </div>
</body>
</html>
