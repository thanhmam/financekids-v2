<!-- @dsCard group="Type" viewport="700x170" name="Display — Baloo 2" subtitle="Rounded display for headings, numbers, buttons — weight 800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-display); color: var(--xu-ink); }
  .wrap { padding: 16px 22px; }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
  .lbl { font: 600 11px var(--font-body); color: var(--xu-caption); width: 96px; flex-shrink: 0; }
  .big { font-weight: 800; line-height: 1.05; }
  .num { color: var(--xu-streak); font-weight: 800; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="lbl">Hero · 34/800</span><span class="big" style="font-size:34px">Chào, mình là XuXu!</span></div>
    <div class="row"><span class="lbl">H1 · 22/800</span><span class="big" style="font-size:22px">Học tài chính vui vẻ</span></div>
    <div class="row"><span class="lbl">H3 · 16/800</span><span class="big" style="font-size:16px">Mục tiêu hôm nay</span></div>
    <div class="row"><span class="lbl">Numbers · 800</span><span class="num" style="font-size:30px">1.250</span><span class="num" style="font-size:30px">+150&nbsp;XP</span><span class="num" style="font-size:30px">7🔥</span></div>
  </div>
</body>
</html>
