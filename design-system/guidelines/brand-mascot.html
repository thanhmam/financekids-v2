<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../styles.css" />
<style>

  .wrap { display: flex; gap: 46px; padding: 24px 30px 18px; align-items: flex-end; }
  .item { text-align: center; }
  .lbl { font: var(--fw-display) 12px var(--font-display); color: var(--xu-ink); margin-top: 16px; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

    const { XuXuMascot } = window.XuXuDesignSystem_72e90e;
    function Card() {
      return (
        <div className="wrap">
          <div className="item"><XuXuMascot size={96} mood="happy" /><div className="lbl">happy</div><div className="sub">default · idle</div></div>
          <div className="item"><XuXuMascot size={96} mood="excited" /><div className="lbl">excited</div><div className="sub">result / reward</div></div>

          <div className="item"><XuXuMascot size={40} mood="happy" /><div className="lbl">size 40</div><div className="sub">inline</div></div>

    ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
