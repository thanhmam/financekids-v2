<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals & Surfaces" subtitle="Green-tinted greys, ink, canvas and dark surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { display: flex; gap: 10px; padding: 18px 20px; flex-wrap: wrap; }
  .sw { width: 92px; }
  .chip { height: 50px; border-radius: 12px; border: 1px solid var(--xu-line); }
  .name { font: var(--fw-display) 11px var(--font-display); color: var(--xu-ink); margin-top: 6px; }
  .hex { font: 600 10px var(--font-body); color: var(--xu-caption); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--xu-ink)"></div><div class="name">ink</div><div class="hex">#15392A</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-ink-soft)"></div><div class="name">ink-soft</div><div class="hex">#34453B</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-muted)"></div><div class="name">muted</div><div class="hex">#5B7065</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-caption)"></div><div class="name">caption</div><div class="hex">#9AA89E</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-faint)"></div><div class="name">faint</div><div class="hex">#C2CDBA</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-line)"></div><div class="name">line</div><div class="hex">#ECF1E6</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-bg)"></div><div class="name">bg canvas</div><div class="hex">#F4F8EF</div></div>
  </div>
</body>
</html>
