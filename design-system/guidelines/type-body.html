<!-- @dsCard group="Type" viewport="700x160" name="Body — Nunito" subtitle="Soft humanist sans for body and captions — weights 600/700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); color: var(--xu-ink-soft); }
  .wrap { padding: 16px 22px; max-width: 560px; }
  .lbl { font: 600 11px var(--font-body); color: var(--xu-caption); margin-bottom: 2px; }
  .body { font: 600 13px var(--font-body); line-height: 1.5; margin-bottom: 12px; }
  .cap { font: 600 12px var(--font-body); color: var(--xu-muted); }
  .micro { font: 700 11px var(--font-body); color: var(--xu-caption); }
  b { font-weight: 800; color: var(--xu-ink); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lbl">Body · 13/600</div>
    <div class="body"><b>Mẹo của XuXu:</b> Để dành 10% mỗi khi nhận tiền nhé! Tiết kiệm nhỏ mỗi ngày, lớn lên giàu to.</div>
    <div class="lbl">Caption · 12/600 &nbsp;·&nbsp; Micro · 11/700</div>
    <div class="cap">Hoàn thành 2/3 bài · còn +10 xu là đạt mục tiêu</div>
    <div class="micro">BẢNG XẾP HẠNG RESET MỖI THỨ HAI</div>
  </div>
</body>
</html>
