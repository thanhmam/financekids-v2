<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Leaf Green" subtitle="The core CTA / progress / active color and its tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { display: flex; gap: 10px; padding: 18px 20px; flex-wrap: wrap; }
  .sw { width: 104px; }
  .chip { height: 56px; border-radius: 12px; border: 1px solid rgba(0,0,0,.05); }
  .name { font: var(--fw-display) 12px var(--font-display); color: var(--xu-ink); margin-top: 7px; }
  .hex { font: 600 11px var(--font-body); color: var(--xu-caption); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--xu-green)"></div><div class="name">green</div><div class="hex">#16C172</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-green-dark)"></div><div class="name">green-dark</div><div class="hex">#0E9E5C</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-green-deeper)"></div><div class="name">green-deeper</div><div class="hex">#0B7A48</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-green-300)"></div><div class="name">green-300</div><div class="hex">#7BE0A8</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-green-100)"></div><div class="name">green-100</div><div class="hex">#E3F7EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--xu-green-50);border:1px solid var(--xu-line)"></div><div class="name">green-50</div><div class="hex">#EAFBF1</div></div>
  </div>
</body>
</html>
