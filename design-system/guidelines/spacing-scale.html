<!-- @dsCard group="Spacing" viewport="700x160" name="Radius & Spacing Scale" subtitle="Friendly corner radii and the 4px-based spacing rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { padding: 16px 22px; display: flex; gap: 36px; }
  .col-lbl { font: 600 11px var(--font-body); color: var(--xu-caption); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .4px; }
  .radii { display: flex; gap: 12px; align-items: flex-end; }
  .rad { width: 54px; height: 54px; background: var(--xu-green-100); border: 2px solid var(--xu-green-border); }
  .rname { font: var(--fw-display) 11px var(--font-display); color: var(--xu-ink); margin-top: 6px; text-align: center; }
  .spacings { display: flex; flex-direction: column; gap: 7px; }
  .srow { display: flex; align-items: center; gap: 10px; }
  .bar { height: 12px; background: var(--xu-streak); border-radius: 3px; }
  .sname { font: 600 11px var(--font-body); color: var(--xu-muted); width: 92px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="col-lbl">Corner radii</div>
      <div class="radii">
        <div><div class="rad" style="border-radius:var(--radius-chip)"></div><div class="rname">chip 12</div></div>
        <div><div class="rad" style="border-radius:var(--radius-button)"></div><div class="rname">btn 14</div></div>
        <div><div class="rad" style="border-radius:var(--radius-card)"></div><div class="rname">card 18</div></div>
        <div><div class="rad" style="border-radius:var(--radius-card-lg)"></div><div class="rname">hero 22</div></div>
        <div><div class="rad" style="border-radius:var(--radius-pill)"></div><div class="rname">pill ∞</div></div>
      </div>
    </div>
    <div>
      <div class="col-lbl">Spacing</div>
      <div class="spacings">
        <div class="srow"><span class="sname">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
        <div class="srow"><span class="sname">space-4 · 14</span><div class="bar" style="width:14px"></div></div>
        <div class="srow"><span class="sname">space-5 · 16</span><div class="bar" style="width:16px"></div></div>
        <div class="srow"><span class="sname">space-6 · 20</span><div class="bar" style="width:20px"></div></div>
        <div class="srow"><span class="sname">space-8 · 28</span><div class="bar" style="width:28px"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
